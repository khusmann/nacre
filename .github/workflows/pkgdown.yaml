# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown.yaml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Install shinylive
        run: install.packages("shinylive")
        shell: Rscript {0}

      - name: Build nacre CRAN repo for WebR
        run: |
          contrib_dir <- file.path("docs", "r-repo", "src", "contrib")
          dir.create(contrib_dir, recursive = TRUE)
          devtools::build(path = contrib_dir, quiet = TRUE)
          tools::write_PACKAGES(contrib_dir, type = "source")
        shell: Rscript {0}

      - name: Export shinylive apps
        run: |
          nacre_repo <- "https://khusmann.github.io/nacre/r-repo/"
          webr_install <- paste0(
            'webr::install("nacre", repos = c("', nacre_repo, '", "https://repo.r-wasm.org"))\n'
          )
          examples <- c(
            "controlled-inputs"  = "controlled_inputs",
            "temperature"        = "temperature",
            "todo"               = "todo",
            "module"             = "module",
            "optimistic-updates" = "optimistic_updates"
          )
          for (slug in names(examples)) {
            app_dir <- file.path(tempdir(), slug)
            dir.create(app_dir)
            app_code <- readLines(file.path("examples", paste0(examples[[slug]], ".R")))
            writeLines(c(webr_install, app_code), file.path(app_dir, "app.R"))
            shinylive::export(
              appdir  = app_dir,
              destdir = file.path("docs", "apps", slug)
            )
          }
        shell: Rscript {0}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub pages
        id: deployment
        uses: actions/deploy-pages@v4
